services:
  metrics-exporter:
    image: python:3.12-slim
    container_name: rafah-market-flow-metrics
    working_dir: /workspace
    command: python /workspace/rafah/monitoring/metrics_exporter.py
    volumes:
      - ../..:/workspace:ro
    environment:
      PROJECT_ROOT: /workspace
      METRICS_PORT: 8010
      KURS_API: ${KURS_API:-http://100.118.244.91:8002}
      NEWS_API: ${NEWS_API:-http://100.118.244.91:8000}
      COMMODITY_API: ${COMMODITY_API:-http://100.92.242.101:8001}
    ports:
      - "8010:8010"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rafah-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=3d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - rafah-prometheus-data:/prometheus
    ports:
      - "9095:9090"
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rafah-grafana
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - rafah-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3300:3000"
    depends_on:
      - prometheus

volumes:
  rafah-prometheus-data:
  rafah-grafana-data:
