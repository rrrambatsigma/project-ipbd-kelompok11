services:
  # ─────────────────────────────────────────
  # SPARK — PySpark job runner + Prefect Worker
  # ─────────────────────────────────────────
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: preprocessing-spark
    restart: unless-stopped
    environment:
      # MinIO
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_RAW: news-raw
      MINIO_BUCKET_PROCESSED: news-processed
      # Telegram (beda bot dari ingestion)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # Prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      # Timezone
      TZ: Asia/Jakarta
      # Spark tuning (dikecilin biar nggak OOM)
      SPARK_DRIVER_MEMORY: 1g
      SPARK_EXECUTOR_MEMORY: 1g

    volumes:
      - ./spark/jobs:/app/jobs
      - spark-logs:/app/logs
    networks:
      - ingestion-net
    entrypoint: ["/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'prefect worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  spark-logs:

networks:
  ingestion-net:
    external: true
    name: ingestion_ingestion-net
