services:
  # ─────────────────────────────────────────
  # SPARK — PySpark job runner
  # ─────────────────────────────────────────
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: preprocessing-spark
    environment:
      # MinIO (sama dengan ingestion)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_RAW: news-raw
      MINIO_BUCKET_PROCESSED: news-processed
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # Spark tuning (dikecilin biar nggak OOM)
      SPARK_DRIVER_MEMORY: 1g
      SPARK_EXECUTOR_MEMORY: 1g

    volumes:
      - ./spark/jobs:/app/jobs
      - spark-logs:/app/logs
    networks:
      - ingestion-net
    command: >
      sh -c "tail -f /dev/null"

volumes:
  spark-logs:

networks:
  ingestion-net:
    external: true
    name: ingestion_ingestion-net
