name: euro-news-modelling
prefect-version: "2.*"

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app/modelling

deployments:
  - name: euro-news-modelling
    entrypoint: modelling_flow.py:modelling_flow
    work_pool:
      name: modelling-pool
    schedules:
      - cron: "30 16 * * 1-5"
        timezone: "UTC"
        active: true
    tags: [news-modelling, euro-market, sentiment]
