services:
  # ─────────────────────────────────────────
  # POSTGRESQL — Database untuk Prefect Server
  # FIX: Ganti SQLite (tidak support concurrent writes)
  #      dengan PostgreSQL yang stabil untuk production
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect123
      POSTGRES_DB: prefect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ingestion-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U prefect -d prefect" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PREFECT SERVER — UI + API + Scheduler
  # FIX: Pakai PostgreSQL, bukan SQLite default
  # ─────────────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:2-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      # FIX: Pakai PostgreSQL agar tidak "database is locked"
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:prefect123@postgres:5432/prefect"
      PREFECT_API_DATABASE_ECHO: "false"
    volumes:
      - prefect-data:/root/.prefect
    networks:
      - ingestion-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health').read()" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PREFECT WORKER — Eksekutor flow batch
  # FIX: Pakai Dockerfile collector agar scrapers/
  #      storage/ utils/ tersedia saat eksekusi flow
  # ─────────────────────────────────────────
  prefect-worker:
    build:
      context: ./collector
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo 'Worker: menunggu Prefect Server...' &&
        until python -c \"import urllib.request; urllib.request.urlopen('http://prefect-server:4200/api/health').read()\" 2>/dev/null; do
          echo 'Server belum ready, tunggu 5s...'
          sleep 5
        done &&
        echo 'Worker: Server ready!' &&
        prefect work-pool create ingestion-pool --type process 2>/dev/null || true &&
        prefect worker start --pool ingestion-pool
      "
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PYTHONPATH: /app/flows
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      GUARDIAN_API_KEY: ${GUARDIAN_API_KEY}
      MINIO_BUCKET_RAW: news-raw
      SELENIUM_HUB_URL: http://selenium-chrome:4444/wd/hub
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT:-30}
      SCRAPER_DELAY_SECONDS: ${SCRAPER_DELAY_SECONDS:-2}
    volumes:
      - prefect-data:/root/.prefect
      - ./collector:/app
    networks:
      - ingestion-net
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # SELENIUM CHROME — Headless scraping
  # ─────────────────────────────────────────
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
    shm_size: "2gb"
    environment:
      SE_NODE_MAX_SESSIONS: 5
      SE_SESSION_REQUEST_TIMEOUT: 300
    networks:
      - ingestion-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4444/wd/hub/status" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MINIO — Object storage S3-compatible
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - ingestion-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MINIO INIT — Buat bucket otomatis
  # ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/news-raw &&
        mc mb --ignore-existing local/news-processed &&
        echo 'Buckets created successfully'
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    networks:
      - ingestion-net

  # ─────────────────────────────────────────
  # COLLECTOR APP — Register deployments ke Prefect
  # FIX: Polling loop reliable, bukan sleep 10
  # ─────────────────────────────────────────
  collector-app:
    build:
      context: ./collector
      dockerfile: Dockerfile
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      SELENIUM_HUB_URL: http://selenium-chrome:4444/wd/hub
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      GUARDIAN_API_KEY: ${GUARDIAN_API_KEY}
      MINIO_BUCKET_RAW: news-raw
      PYTHONPATH: /app/flows
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SCRAPER_REQUEST_TIMEOUT: ${SCRAPER_REQUEST_TIMEOUT:-30}
      SCRAPER_DELAY_SECONDS: ${SCRAPER_DELAY_SECONDS:-2}
    volumes:
      - ./collector:/app
      - logs:/app/logs
    networks:
      - ingestion-net
    depends_on:
      prefect-server:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Collector App: menunggu semua service ready ===' &&
        until python -c \"import urllib.request; urllib.request.urlopen('http://prefect-server:4200/api/health').read()\" 2>/dev/null; do
          echo 'Prefect Server belum ready, tunggu 5s...'
          sleep 5
        done &&
        echo 'Prefect Server: READY' &&
        until python -c \"from minio import Minio; c=Minio('minio:9000',access_key='${MINIO_ACCESS_KEY}',secret_key='${MINIO_SECRET_KEY}',secure=False); c.list_buckets()\" 2>/dev/null; do
          echo 'MinIO belum ready, tunggu 5s...'
          sleep 5
        done &&
        echo 'MinIO: READY' &&
        cd /app/flows &&
        echo 'Mendaftarkan semua deployments...' &&
        prefect deploy --all &&
        echo '=== Semua deployment berhasil didaftarkan! ===' &&
        tail -f /dev/null
      "

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────
volumes:
  postgres-data:
  minio-data:
  prefect-data:
  logs:

networks:
  ingestion-net:
    driver: bridge
