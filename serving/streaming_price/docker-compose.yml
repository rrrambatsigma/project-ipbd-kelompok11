services:
  kafka:
    image: apache/kafka:4.1.2
    container_name: eurusd-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ingestion-net
    restart: unless-stopped

  market-minio-init:
    image: minio/mc:latest
    container_name: market-minio-init
    env_file:
      - .env
    networks:
      - ingestion-net
    entrypoint: >
      sh -c "
        echo 'Waiting for existing MinIO...' &&
        until mc alias set local http://$${MINIO_ENDPOINT} $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do
          echo 'MinIO not ready, retrying...';
          sleep 5;
        done &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_MARKET} &&
        echo 'Market bucket ready: '$${MINIO_BUCKET_MARKET}
      "

  eurusd-producer:
    build: ./producer
    container_name: eurusd-producer
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - ingestion-net
    restart: unless-stopped

  eurusd-processor:
    build: ./processor
    container_name: eurusd-processor
    env_file:
      - .env
    depends_on:
      - kafka
      - market-minio-init
    networks:
      - ingestion-net
    restart: unless-stopped

  eurusd-dashboard:
    build: ./dashboard
    container_name: eurusd-dashboard
    env_file:
      - .env
    ports:
      - "8501:8501"
    networks:
      - ingestion-net
    restart: unless-stopped


networks:
  ingestion-net:
    external: true
    name: ingestion_ingestion-net
